jobs:
  stage_0_job_0:
    name: mutex rqt-common-plugins desktop desktop-full
    runs-on: macos-13
    strategy:
      fail-fast: false
    needs: []
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Build ros-distro-mutex ros-noetic-rqt-common-plugins ros-noetic-desktop
        ros-noetic-desktop-full
      env:
        ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        CURRENT_RECIPES: ros-distro-mutex ros-noetic-rqt-common-plugins ros-noetic-desktop
          ros-noetic-desktop-full
      run: |
        export CI=azure
        export GIT_BRANCH=$BUILD_SOURCEBRANCHNAME
        export FEEDSTOCK_NAME=$(basename ${BUILD_REPOSITORY_NAME})
        .scripts/build_osx.sh
name: build_osx
on:
  push:
    branches:
    - buildbranch_osx
