# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-noetic-diff-drive-controller
  version: 0.22.0
source:
  git: https://github.com/ros-gbp/ros_controllers-release.git
  tag: release/noetic/diff_drive_controller/0.22.0-1
  target_directory: ros-noetic-diff-drive-controller/src/work

build:
  script: ${{ '$RECIPE_DIR/build_catkin.sh' if unix else '%RECIPE_DIR%\\bld_catkin.bat' }}
  number: 18
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - libboost-devel
    - libboost-python-devel
    - numpy
    - pip
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-catkin
    - ros-noetic-control-msgs
    - ros-noetic-controller-interface
    - ros-noetic-controller-manager
    - ros-noetic-dynamic-reconfigure
    - ros-noetic-geometry-msgs
    - ros-noetic-hardware-interface
    - ros-noetic-nav-msgs
    - ros-noetic-pluginlib
    - ros-noetic-realtime-tools
    - ros-noetic-rosgraph-msgs
    - ros-noetic-rostest
    - ros-noetic-rostopic
    - ros-noetic-std-srvs
    - ros-noetic-tf
    - ros-noetic-urdf
    - ros-noetic-xacro
  run:
    - libboost-devel
    - libboost-python-devel
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-control-msgs
    - ros-noetic-controller-interface
    - ros-noetic-dynamic-reconfigure
    - ros-noetic-geometry-msgs
    - ros-noetic-hardware-interface
    - ros-noetic-nav-msgs
    - ros-noetic-pluginlib
    - ros-noetic-realtime-tools
    - ros-noetic-tf
    - ros-noetic-urdf
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
