package:
  name: ros-noetic-mbf-costmap-core
  version: 0.4.0
source:
  git_url: https://github.com/uos-gbp/move_base_flex-release.git
  git_rev: release/noetic/mbf_costmap_core/0.4.0-1
  folder: ros-noetic-mbf-costmap-core/src/work

build:
  script:
    sel(win): bld_catkin.bat
    sel(unix): build_catkin.sh
  number: 16
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - sel(linux64): sysroot_linux-64 2.17
    - ninja
    - setuptools
    - sel(unix): make
    - sel(unix): coreutils
    - sel(osx): tapi
    - sel(build_platform != target_platform): pkg-config
    - cmake
    - cython
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): numpy
  host:
    - numpy
    - pip
    - sel(build_platform == target_platform): pkg-config
    - python
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-catkin
    - ros-noetic-costmap-2d
    - ros-noetic-geometry-msgs
    - ros-noetic-mbf-abstract-core
    - ros-noetic-mbf-utility
    - ros-noetic-nav-core
    - ros-noetic-std-msgs
    - ros-noetic-tf
  run:
    - python
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-costmap-2d
    - ros-noetic-geometry-msgs
    - ros-noetic-mbf-abstract-core
    - ros-noetic-mbf-utility
    - ros-noetic-nav-core
    - ros-noetic-std-msgs
    - ros-noetic-tf
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
