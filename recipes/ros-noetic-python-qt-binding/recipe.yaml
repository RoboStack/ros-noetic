# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-noetic-python-qt-binding
  version: 0.4.4
source:
  git: https://github.com/ros-gbp/python_qt_binding-release.git
  tag: release/noetic/python_qt_binding/0.4.4-1
  target_directory: ros-noetic-python-qt-binding/src/work
  patches:
    - patch/ros-noetic-python-qt-binding.patch

build:
  script: ${{ '$RECIPE_DIR/build_catkin.sh' if unix else '%RECIPE_DIR%\\bld_catkin.bat' }}
  number: 18
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - pyqt-builder
    - pyqt5-sip
    - sip 6.7.*
    - if: build_platform != target_platform
      then:
        - qt-main
    - if: build_platform != target_platform
      then:
        - pyqt-builder
  host:
    - ${{ 'setuptools 69.*' if win }}
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - pyqt
    - python
    - qt-main
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-catkin
    - ros-noetic-rosbuild
    - sip 6.7.*
    - if: build_platform == target_platform
      then:
        - pyqt-builder
    - if: linux
      then:
        - libgl-devel
        - libopengl-devel
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - adwaita-icon-theme
    - pyqt
    - pyqt-builder
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-catkin
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
