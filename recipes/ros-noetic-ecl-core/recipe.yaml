# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-noetic-ecl-core
  version: 0.62.3
source:
  git: https://github.com/yujinrobot-release/ecl_core-release.git
  tag: release/noetic/ecl_core/0.62.3-1
  target_directory: ros-noetic-ecl-core/src/work

build:
  script: ${{ '$RECIPE_DIR/build_catkin.sh' if unix else '%RECIPE_DIR%\\bld_catkin.bat' }}
  number: 18
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-catkin
    - ros-noetic-ecl-command-line
    - ros-noetic-ecl-concepts
    - ros-noetic-ecl-containers
    - ros-noetic-ecl-converters
    - ros-noetic-ecl-core-apps
    - ros-noetic-ecl-devices
    - ros-noetic-ecl-eigen
    - ros-noetic-ecl-exceptions
    - ros-noetic-ecl-formatters
    - ros-noetic-ecl-geometry
    - ros-noetic-ecl-ipc
    - ros-noetic-ecl-linear-algebra
    - ros-noetic-ecl-math
    - ros-noetic-ecl-mpl
    - ros-noetic-ecl-sigslots
    - ros-noetic-ecl-statistics
    - ros-noetic-ecl-streams
    - ros-noetic-ecl-threads
    - ros-noetic-ecl-time
    - ros-noetic-ecl-type-traits
    - ros-noetic-ecl-utilities
  run:
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-ecl-command-line
    - ros-noetic-ecl-concepts
    - ros-noetic-ecl-containers
    - ros-noetic-ecl-converters
    - ros-noetic-ecl-core-apps
    - ros-noetic-ecl-devices
    - ros-noetic-ecl-eigen
    - ros-noetic-ecl-exceptions
    - ros-noetic-ecl-formatters
    - ros-noetic-ecl-geometry
    - ros-noetic-ecl-ipc
    - ros-noetic-ecl-linear-algebra
    - ros-noetic-ecl-math
    - ros-noetic-ecl-mpl
    - ros-noetic-ecl-sigslots
    - ros-noetic-ecl-statistics
    - ros-noetic-ecl-streams
    - ros-noetic-ecl-threads
    - ros-noetic-ecl-time
    - ros-noetic-ecl-type-traits
    - ros-noetic-ecl-utilities
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
