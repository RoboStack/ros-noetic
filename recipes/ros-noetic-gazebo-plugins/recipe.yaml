# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-noetic-gazebo-plugins
  version: 2.9.2
source:
  git: https://github.com/ros-gbp/gazebo_ros_pkgs-release.git
  tag: release/noetic/gazebo_plugins/2.9.2-1
  target_directory: ros-noetic-gazebo-plugins/src/work
  patches:
    - patch/ros-noetic-gazebo-plugins.patch
    - patch/ros-noetic-gazebo-plugins.osx.patch

build:
  script: ${{ '$RECIPE_DIR/build_catkin.sh' if unix else '%RECIPE_DIR%\\bld_catkin.bat' }}
  number: 21
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-angles
    - ros-noetic-camera-info-manager
    - ros-noetic-catkin
    - ros-noetic-cv-bridge
    - ros-noetic-diagnostic-updater
    - ros-noetic-dynamic-reconfigure
    - ros-noetic-gazebo-dev
    - ros-noetic-gazebo-msgs
    - ros-noetic-gazebo-ros
    - ros-noetic-geometry-msgs
    - ros-noetic-image-transport
    - ros-noetic-message-generation
    - ros-noetic-nav-msgs
    - ros-noetic-nodelet
    - ros-noetic-polled-camera
    - ros-noetic-rosconsole
    - ros-noetic-roscpp
    - ros-noetic-rosgraph-msgs
    - ros-noetic-rospy
    - ros-noetic-rostest
    - ros-noetic-sensor-msgs
    - ros-noetic-std-msgs
    - ros-noetic-std-srvs
    - ros-noetic-tf
    - ros-noetic-tf2-ros
    - ros-noetic-trajectory-msgs
    - ros-noetic-urdf
    - ros-noetic-visualization-msgs
    - tbb
    - tbb-devel
  run:
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-angles
    - ros-noetic-camera-info-manager
    - ros-noetic-cv-bridge
    - ros-noetic-diagnostic-updater
    - ros-noetic-dynamic-reconfigure
    - ros-noetic-gazebo-dev
    - ros-noetic-gazebo-msgs
    - ros-noetic-gazebo-ros
    - ros-noetic-geometry-msgs
    - ros-noetic-image-transport
    - ros-noetic-message-runtime
    - ros-noetic-nav-msgs
    - ros-noetic-nodelet
    - ros-noetic-polled-camera
    - ros-noetic-rosconsole
    - ros-noetic-roscpp
    - ros-noetic-rosgraph-msgs
    - ros-noetic-rospy
    - ros-noetic-sensor-msgs
    - ros-noetic-std-msgs
    - ros-noetic-std-srvs
    - ros-noetic-tf
    - ros-noetic-tf2-ros
    - ros-noetic-trajectory-msgs
    - ros-noetic-urdf
    - ros-noetic-visualization-msgs
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
