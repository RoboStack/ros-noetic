package:
  name: ros-noetic-socketcan-interface
  version: 0.8.5
source:
  git_url: https://github.com/ros-industrial-release/ros_canopen-release.git
  git_rev: release/noetic/socketcan_interface/0.8.5-1
  folder: ros-noetic-socketcan-interface/src/work

build:
  script:
    sel(win): bld_catkin.bat
    sel(unix): build_catkin.sh
  number: 17
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - sel(linux64): sysroot_linux-64 2.17
    - ninja
    - setuptools
    - sel(unix): make
    - sel(unix): coreutils
    - sel(osx): tapi
    - sel(build_platform != target_platform): pkg-config
    - cmake
    - cython
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): numpy
  host:
    - console_bridge
    - libboost-devel
    - libboost-python-devel
    - numpy
    - pip
    - sel(build_platform == target_platform): pkg-config
    - python
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-catkin
    - ros-noetic-class-loader
    - ros-noetic-rosunit
    - ros-noetic-xmlrpcpp
  run:
    - console_bridge
    - libboost-devel
    - libboost-python-devel
    - python
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-class-loader
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
