# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-noetic-plotjuggler
  version: 3.9.1
source:
  git: https://github.com/facontidavide/plotjuggler-release.git
  tag: release/noetic/plotjuggler/3.9.1-1
  target_directory: ros-noetic-plotjuggler/src/work
  patches:
    - patch/ros-noetic-plotjuggler.patch
    - patch/ros-noetic-plotjuggler.unix.patch

build:
  script: ${{ '$RECIPE_DIR/build_catkin.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_catkin.bat' }}
  number: 12
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - if: build_platform != target_platform
      then:
        - qt-main
  host:
    - ${{ 'elfutils' if linux }}
    - binutils
    - if: build_platform == target_platform
      then:
        - pkg-config
    - cppzmq
    - libboost-devel
    - libboost-python-devel
    - libprotobuf
    - lz4
    - numpy
    - pip
    - protobuf
    - python
    - qt-main
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-catkin
    - ros-noetic-roscpp
    - ros-noetic-roslib
    - zeromq
    - zstd
    - if: linux
      then:
        - libgl-devel
        - libopengl-devel
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - binutils
    - cppzmq
    - libboost-devel
    - libboost-python-devel
    - libprotobuf
    - lz4
    - protobuf
    - python
    - qt-main
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-roscpp
    - ros-noetic-roslib
    - zeromq
    - zstd
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
