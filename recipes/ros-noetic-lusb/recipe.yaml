package:
  name: ros-noetic-lusb
  version: 1.1.0
source:
  git_url: https://github.com/DataspeedInc-release/lusb-release.git
  git_rev: release/noetic/lusb/1.1.0-1
  folder: ros-noetic-lusb/src/work
  patches:
    - patch/ros-noetic-lusb.patch

build:
  script:
    sel(win): bld_catkin.bat
    sel(unix): build_catkin.sh
  number: 17
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - sel(linux64): sysroot_linux-64 2.17
    - ninja
    - setuptools
    - sel(unix): make
    - sel(unix): coreutils
    - sel(osx): tapi
    - sel(build_platform != target_platform): pkg-config
    - cmake
    - cython
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): numpy
  host:
    - libboost-devel
    - libboost-python-devel
    - libudev
    - libusb
    - numpy
    - pip
    - sel(build_platform == target_platform): pkg-config
    - python
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-catkin
  run:
    - libboost-devel
    - libboost-python-devel
    - libudev
    - libusb
    - python
    - ros-distro-mutex 0.5 noetic
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
