# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-noetic-moveit-core
  version: 1.1.16
source:
  git: https://github.com/ros-gbp/moveit-release.git
  tag: release/noetic/moveit_core/1.1.16-1
  target_directory: ros-noetic-moveit-core/src/work
  patches:
    - patch/ros-noetic-moveit-core.patch

build:
  script: ${{ '$RECIPE_DIR/build_catkin.sh' if unix else '%RECIPE_DIR%\\bld_catkin.bat' }}
  number: 9
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - assimp
    - benchmark
    - if: build_platform == target_platform
      then:
        - pkg-config
    - bullet
    - console_bridge
    - eigen
    - libboost-devel
    - libboost-python-devel
    - numpy
    - orocos-kdl
    - pip
    - pkg-config
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-angles
    - ros-noetic-catkin
    - ros-noetic-eigen-stl-containers
    - ros-noetic-fcl
    - ros-noetic-geometric-shapes
    - ros-noetic-geometry-msgs
    - ros-noetic-kdl-parser
    - ros-noetic-moveit-msgs
    - ros-noetic-moveit-resources-panda-moveit-config
    - ros-noetic-moveit-resources-pr2-description
    - ros-noetic-octomap
    - ros-noetic-octomap-msgs
    - ros-noetic-pluginlib
    - ros-noetic-pybind11-catkin
    - ros-noetic-random-numbers
    - ros-noetic-rosconsole
    - ros-noetic-roslib
    - ros-noetic-rostest
    - ros-noetic-rostime
    - ros-noetic-rosunit
    - ros-noetic-ruckig
    - ros-noetic-sensor-msgs
    - ros-noetic-shape-msgs
    - ros-noetic-srdfdom
    - ros-noetic-std-msgs
    - ros-noetic-tf2-eigen
    - ros-noetic-tf2-geometry-msgs
    - ros-noetic-tf2-kdl
    - ros-noetic-trajectory-msgs
    - ros-noetic-urdf
    - ros-noetic-visualization-msgs
    - ros-noetic-xmlrpcpp
    - urdfdom
    - urdfdom_headers
  run:
    - assimp
    - bullet
    - console_bridge
    - eigen
    - libboost-devel
    - libboost-python-devel
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-eigen-stl-containers
    - ros-noetic-fcl
    - ros-noetic-geometric-shapes
    - ros-noetic-geometry-msgs
    - ros-noetic-kdl-parser
    - ros-noetic-moveit-msgs
    - ros-noetic-octomap
    - ros-noetic-octomap-msgs
    - ros-noetic-pluginlib
    - ros-noetic-pybind11-catkin
    - ros-noetic-random-numbers
    - ros-noetic-rosconsole
    - ros-noetic-roslib
    - ros-noetic-rostime
    - ros-noetic-ruckig
    - ros-noetic-sensor-msgs
    - ros-noetic-shape-msgs
    - ros-noetic-srdfdom
    - ros-noetic-std-msgs
    - ros-noetic-tf2-eigen
    - ros-noetic-tf2-geometry-msgs
    - ros-noetic-trajectory-msgs
    - ros-noetic-urdf
    - ros-noetic-visualization-msgs
    - ros-noetic-xmlrpcpp
    - urdfdom
    - urdfdom_headers
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
