# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-noetic-rosmon-core
  version: 2.5.1
source:
  git: https://github.com/xqms/rosmon-release.git
  tag: release/noetic/rosmon_core/2.5.1-2
  target_directory: ros-noetic-rosmon-core/src/work
  patches:
    - patch/ros-noetic-rosmon-core.patch

build:
  script: ${{ '$RECIPE_DIR/build_catkin.sh' if unix else '%RECIPE_DIR%\\bld_catkin.bat' }}
  number: 18
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - libboost-devel
    - libboost-python-devel
    - ncurses
    - numpy
    - pip
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-catch-ros
    - ros-noetic-catkin
    - ros-noetic-cmake-modules
    - ros-noetic-diagnostic-msgs
    - ros-noetic-rosbash
    - ros-noetic-roscpp
    - ros-noetic-rosfmt
    - ros-noetic-roslib
    - ros-noetic-rosmon-msgs
    - ros-noetic-rospack
    - ros-noetic-rostest
    - ros-noetic-std-msgs
    - rospkg
    - tinyxml
    - yaml-cpp
  run:
    - libboost-devel
    - libboost-python-devel
    - ncurses
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-cmake-modules
    - ros-noetic-diagnostic-msgs
    - ros-noetic-rosbash
    - ros-noetic-roscpp
    - ros-noetic-rosfmt
    - ros-noetic-roslib
    - ros-noetic-rosmon-msgs
    - ros-noetic-rospack
    - ros-noetic-std-msgs
    - tinyxml
    - yaml-cpp
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
