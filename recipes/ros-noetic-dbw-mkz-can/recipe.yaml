package:
  name: ros-noetic-dbw-mkz-can
  version: 1.6.5
source:
  git_url: https://github.com/DataspeedInc-release/dbw_mkz_ros-release.git
  git_rev: release/noetic/dbw_mkz_can/1.6.5-1
  folder: ros-noetic-dbw-mkz-can/src/work

build:
  script:
    sel(win): bld_catkin.bat
    sel(unix): build_catkin.sh
  number: 17
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - sel(linux64): sysroot_linux-64 2.17
    - ninja
    - setuptools
    - sel(unix): make
    - sel(unix): coreutils
    - sel(osx): tapi
    - sel(build_platform != target_platform): pkg-config
    - cmake
    - cython
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): numpy
  host:
    - numpy
    - pip
    - sel(build_platform == target_platform): pkg-config
    - python
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-can-msgs
    - ros-noetic-catkin
    - ros-noetic-dataspeed-can-msg-filters
    - ros-noetic-dbw-mkz-msgs
    - ros-noetic-geometry-msgs
    - ros-noetic-nodelet
    - ros-noetic-roscpp
    - ros-noetic-roslaunch
    - ros-noetic-rospy
    - ros-noetic-sensor-msgs
    - ros-noetic-std-msgs
  run:
    - python
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-can-msgs
    - ros-noetic-dataspeed-can-usb
    - ros-noetic-dataspeed-ulc-can
    - ros-noetic-dbw-mkz-description
    - ros-noetic-dbw-mkz-msgs
    - ros-noetic-geometry-msgs
    - ros-noetic-nodelet
    - ros-noetic-roscpp
    - ros-noetic-roslaunch
    - ros-noetic-rospy
    - ros-noetic-sensor-msgs
    - ros-noetic-socketcan-bridge
    - ros-noetic-std-msgs
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
