package:
  name: ros-noetic-plotjuggler-ros
  version: 2.1.1
source:
  git_url: https://github.com/PlotJuggler/plotjuggler-ros-plugins-release.git
  git_rev: release/noetic/plotjuggler_ros/2.1.1-2
  folder: ros-noetic-plotjuggler-ros/src/work

build:
  script:
    sel(win): bld_catkin.bat
    sel(unix): build_catkin.sh
  number: 16
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - sel(linux64): sysroot_linux-64 2.17
    - ninja
    - setuptools
    - sel(unix): make
    - sel(unix): coreutils
    - sel(osx): tapi
    - sel(build_platform != target_platform): pkg-config
    - cmake
    - cython
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): numpy
    - sel(linux): "{{ cdt('mesa-libgl-devel') }}"
    - sel(linux): "{{ cdt('mesa-dri-drivers') }}"
    - sel(linux): "{{ cdt('libselinux') }}"
    - sel(linux): "{{ cdt('libxdamage') }}"
    - sel(linux): "{{ cdt('libxxf86vm') }}"
    - sel(linux): "{{ cdt('libxfixes') }}"
    - sel(linux): "{{ cdt('libxext') }}"
    - sel(linux): "{{ cdt('libxau') }}"
    - sel(linux): "{{ cdt('libxcb') }}"
  host:
    - libboost-devel
    - libboost-python-devel
    - numpy
    - pip
    - sel(build_platform == target_platform): pkg-config
    - python
    - qt-main
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-catkin
    - ros-noetic-plotjuggler
    - ros-noetic-ros-type-introspection
    - ros-noetic-rosbag-storage
    - ros-noetic-roscpp
    - ros-noetic-roscpp-serialization
    - ros-noetic-tf2-msgs
    - ros-noetic-tf2-ros
    - sel(unix): xorg-libx11
    - sel(unix): xorg-libxext
  run:
    - libboost-devel
    - libboost-python-devel
    - python
    - qt-main
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-plotjuggler
    - ros-noetic-ros-type-introspection
    - ros-noetic-rosbag-storage
    - ros-noetic-roscpp
    - ros-noetic-roscpp-serialization
    - ros-noetic-tf2-msgs
    - ros-noetic-tf2-ros
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
    - sel(unix): xorg-libx11
    - sel(unix): xorg-libxext
