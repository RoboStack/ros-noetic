package:
  name: ros-noetic-tf2-bullet
  version: 0.7.7
source:
  git_url: https://github.com/ros-gbp/geometry2-release.git
  git_rev: release/noetic/tf2_bullet/0.7.7-1
  folder: ros-noetic-tf2-bullet/src/work

build:
  script:
    sel(win): bld_catkin.bat
    sel(unix): build_catkin.sh
  number: 16
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - sel(linux64): sysroot_linux-64 2.17
    - ninja
    - setuptools
    - sel(unix): make
    - sel(unix): coreutils
    - sel(osx): tapi
    - sel(build_platform != target_platform): pkg-config
    - cmake
    - cython
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): numpy
  host:
    - bullet
    - numpy
    - pip
    - sel(build_platform == target_platform): pkg-config
    - pkg-config
    - python
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-catkin
    - ros-noetic-geometry-msgs
    - ros-noetic-tf2
  run:
    - bullet
    - python
    - ros-distro-mutex 0.5 noetic
    - ros-noetic-geometry-msgs
    - ros-noetic-tf2
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
