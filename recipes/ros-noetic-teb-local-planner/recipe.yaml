# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-noetic-teb-local-planner
  version: 0.9.1
source:
  git: https://github.com/rst-tu-dortmund/teb_local_planner-release.git
  tag: release/noetic/teb_local_planner/0.9.1-1
  target_directory: ros-noetic-teb-local-planner/src/work
  patches:
    - patch/ros-noetic-teb-local-planner.linux.patch

build:
  script: ${{ '$RECIPE_DIR/build_catkin.sh' if unix else '%RECIPE_DIR%\\bld_catkin.bat' }}
  number: 18
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - numpy
    - pip
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-base-local-planner
    - ros-noetic-catkin
    - ros-noetic-cmake-modules
    - ros-noetic-costmap-2d
    - ros-noetic-costmap-converter
    - ros-noetic-dynamic-reconfigure
    - ros-noetic-geometry-msgs
    - ros-noetic-interactive-markers
    - ros-noetic-libg2o
    - ros-noetic-mbf-costmap-core
    - ros-noetic-mbf-msgs
    - ros-noetic-message-generation
    - ros-noetic-message-runtime
    - ros-noetic-nav-core
    - ros-noetic-nav-msgs
    - ros-noetic-pluginlib
    - ros-noetic-roscpp
    - ros-noetic-std-msgs
    - ros-noetic-tf2
    - ros-noetic-tf2-eigen
    - ros-noetic-tf2-geometry-msgs
    - ros-noetic-tf2-ros
    - ros-noetic-visualization-msgs
  run:
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-base-local-planner
    - ros-noetic-costmap-2d
    - ros-noetic-costmap-converter
    - ros-noetic-dynamic-reconfigure
    - ros-noetic-geometry-msgs
    - ros-noetic-interactive-markers
    - ros-noetic-libg2o
    - ros-noetic-mbf-costmap-core
    - ros-noetic-mbf-msgs
    - ros-noetic-message-runtime
    - ros-noetic-nav-core
    - ros-noetic-nav-msgs
    - ros-noetic-pluginlib
    - ros-noetic-roscpp
    - ros-noetic-std-msgs
    - ros-noetic-tf2
    - ros-noetic-tf2-ros
    - ros-noetic-visualization-msgs
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
