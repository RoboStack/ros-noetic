# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-noetic-jsk-recognition-utils
  version: 1.2.17
source:
  git: https://github.com/tork-a/jsk_recognition-release.git
  tag: release/noetic/jsk_recognition_utils/1.2.17-2
  target_directory: ros-noetic-jsk-recognition-utils/src/work
  patches:
    - patch/ros-noetic-jsk-recognition-utils.patch

build:
  script: ${{ '$RECIPE_DIR/build_catkin.sh' if unix else '%RECIPE_DIR%\\bld_catkin.bat' }}
  number: 18
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - if: build_platform != target_platform
      then:
        - qt-main
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - cython
    - glew
    - numpy
    - pip
    - python
    - qt-main
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-catkin
    - ros-noetic-dynamic-reconfigure
    - ros-noetic-eigen-conversions
    - ros-noetic-geometry-msgs
    - ros-noetic-image-geometry
    - ros-noetic-jsk-data
    - ros-noetic-jsk-recognition-msgs
    - ros-noetic-jsk-tools
    - ros-noetic-jsk-topic-tools
    - ros-noetic-message-generation
    - ros-noetic-pcl-msgs
    - ros-noetic-pcl-ros
    - ros-noetic-sensor-msgs
    - ros-noetic-std-msgs
    - ros-noetic-tf
    - ros-noetic-tf-conversions
    - ros-noetic-tf2-ros
    - ros-noetic-visualization-msgs
    - setuptools
    - yaml-cpp
    - if: linux
      then:
        - libgl-devel
        - libopengl-devel
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - chainer
    - glew
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-eigen-conversions
    - ros-noetic-geometry-msgs
    - ros-noetic-image-geometry
    - ros-noetic-image-view
    - ros-noetic-jsk-recognition-msgs
    - ros-noetic-jsk-topic-tools
    - ros-noetic-message-runtime
    - ros-noetic-pcl-msgs
    - ros-noetic-pcl-ros
    - ros-noetic-sensor-msgs
    - ros-noetic-std-msgs
    - ros-noetic-tf
    - ros-noetic-tf-conversions
    - ros-noetic-tf2-ros
    - ros-noetic-visualization-msgs
    - scikit-image
    - shapely
    - yaml-cpp
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
