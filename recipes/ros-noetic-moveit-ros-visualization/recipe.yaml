# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-noetic-moveit-ros-visualization
  version: 1.1.16
source:
  git: https://github.com/ros-gbp/moveit-release.git
  tag: release/noetic/moveit_ros_visualization/1.1.16-1
  target_directory: ros-noetic-moveit-ros-visualization/src/work
  patches:
    - patch/ros-noetic-moveit-ros-visualization.patch
    - patch/ros-noetic-moveit-ros-visualization.win.patch

build:
  script: ${{ '$RECIPE_DIR/build_catkin.sh' if unix else '%RECIPE_DIR%\\bld_catkin.bat' }}
  number: 17
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
    - if: build_platform != target_platform
      then:
        - qt-main
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - eigen
    - numpy
    - ogre
    - pip
    - pkg-config
    - python
    - qt-main
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-catkin
    - ros-noetic-class-loader
    - ros-noetic-geometric-shapes
    - ros-noetic-interactive-markers
    - ros-noetic-moveit-ros-perception
    - ros-noetic-moveit-ros-planning-interface
    - ros-noetic-moveit-ros-robot-interaction
    - ros-noetic-moveit-ros-warehouse
    - ros-noetic-object-recognition-msgs
    - ros-noetic-pluginlib
    - ros-noetic-rosconsole
    - ros-noetic-roscpp
    - ros-noetic-rospy
    - ros-noetic-rostest
    - ros-noetic-rviz
    - ros-noetic-tf2-eigen
    - if: linux
      then:
        - libgl-devel
        - libopengl-devel
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
  run:
    - python
    - ros-distro-mutex 0.6.* noetic_*
    - ros-noetic-geometric-shapes
    - ros-noetic-interactive-markers
    - ros-noetic-moveit-ros-perception
    - ros-noetic-moveit-ros-planning-interface
    - ros-noetic-moveit-ros-robot-interaction
    - ros-noetic-moveit-ros-warehouse
    - ros-noetic-object-recognition-msgs
    - ros-noetic-pluginlib
    - ros-noetic-rosconsole
    - ros-noetic-roscpp
    - ros-noetic-rospy
    - ros-noetic-rviz
    - ros-noetic-tf2-eigen
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
    - if: unix
      then:
        - xorg-libx11
        - xorg-libxext
